name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Run pnpm audit
        run: pnpm audit
        env:
          NODE_OPTIONS: --no-deprecation

  linter:
    name: Linter (no-spec)
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Run ESLint (exclude spec files)
        run: pnpm lint:no-spec
        env:
          NODE_OPTIONS: --no-deprecation

  check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: linter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: TypeScript type check
        run: pnpm check
        env:
          NODE_OPTIONS: --no-deprecation

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: check
    if: >
      github.ref_name == 'main' ||
      github.ref_name == 'develop' ||
      github.base_ref == 'main' ||
      github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        run: docker compose build test
      - name: Run unit tests inside container
        run: docker compose run --rm test
      - name: Extract coverage report from container
        if: always()
        run: |
          docker compose run --rm --entrypoint "" test \
            sh -c "cp -r /app/coverage /tmp/coverage-out" || true
          docker cp \
            "$(docker compose ps -q test 2>/dev/null | head -1)":/tmp/coverage-out ./coverage \
            2>/dev/null || \
          docker run --rm \
            -v "$(basename $(pwd))_coverage:/data" \
            -v "$PWD:/host" \
            alpine sh -c "cp -r /data /host/coverage" 2>/dev/null || true
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

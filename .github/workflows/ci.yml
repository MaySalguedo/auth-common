name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: bash scripts/enable-pnpm.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Run pnpm audit
        run: pnpm audit
        env:
          NODE_OPTIONS: --no-deprecation

  linter:
    name: Linter (no-spec)
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: bash scripts/enable-pnpm.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Run ESLint (exclude spec files)
        run: pnpm lint:no-spec
        env:
          NODE_OPTIONS: --no-deprecation

  check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: linter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: bash scripts/enable-pnpm.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: TypeScript type check
        run: pnpm check
        env:
          NODE_OPTIONS: --no-deprecation

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: check
    if: >
      github.ref_name == 'main' ||
      github.ref_name == 'develop' ||
      github.base_ref == 'main' ||
      github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        run: docker compose build test
      - name: Run unit tests inside container
        run: docker compose run --rm test
      - name: Extract coverage report from container
        if: always()
        run: bash scripts/extract-coverage.sh
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

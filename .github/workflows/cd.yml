name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  setup:
    name: Setup & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-npmjs:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Set version from tag
        run: jq ".version = \"${GITHUB_REF_NAME#v}\"" package.json > package.tmp.json && mv package.tmp.json package.json
      - name: Publish to npmjs
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_OPTIONS: --no-deprecation

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Set version from tag
        run: jq ".version = \"${GITHUB_REF_NAME#v}\"" package.json > package.tmp.json && mv package.tmp.json package.json
      - name: Publish to GitHub Packages
        run: |
          echo "@may-salguedo:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm publish --access public
        env:
          NODE_OPTIONS: --no-deprecation

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-github
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

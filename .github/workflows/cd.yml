name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Check CI status for commit
        run: bash scripts/wait-for-ci.sh "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  setup:
    name: Setup & Build
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: bash scripts/enable-pnpm.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --no-deprecation
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: trivy.yaml

  publish-npmjs:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    needs: [setup, trivy-scan]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Enable pnpm
        run: bash scripts/enable-pnpm.sh
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to npmjs
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_OPTIONS: --no-deprecation

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [setup, trivy-scan]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: bash scripts/enable-pnpm.sh
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Set version from tag
        if: github.event_name != 'workflow_dispatch'
        run: bash scripts/set-version-from-tag.sh
      - name: Publish to GitHub Packages
        run: bash scripts/publish-github-packages.sh
        env:
          PACKAGES_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --no-deprecation

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-github
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

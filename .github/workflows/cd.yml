name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

jobs:

  setup:
    name: Setup & Build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Verify tag commit is on main
        if: github.event_name != 'workflow_dispatch'
        run: |
          git fetch origin main --depth=50
          if ! git merge-base --is-ancestor ${{ github.event.workflow_run.head_sha }} origin/main; then
            echo "Tag commit is not an ancestor of main. Aborting."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-npmjs:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to npmjs
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_OPTIONS: --no-deprecation

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          pnpm publish --access public --no-git-checks --registry https://npm.pkg.github.com
        env:
          NODE_OPTIONS: --no-deprecation

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-github
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        run: >
          gh release create
          "${{ github.event.workflow_run.head_branch }}"
          --generate-notes
          --target "${{ github.event.workflow_run.head_sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

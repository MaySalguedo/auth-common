# ═══════════════════════════════════════════════════════════════════════
#  CI / CD — @neoatalaya/auth-common
# ───────────────────────────────────────────────────────────────────────
#  CI  → runs on every push / PR to  main  and  develop
#         jobs: lint → test (Docker) → build
#
#  CD  → runs on push to  main  ONLY when every CI job passes
#         job:  publish to npm
# ═══════════════════════════════════════════════════════════════════════

name: CI / CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: 🧪 Unit Tests (Docker)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: |
          docker compose build test

      - name: Run unit tests inside container
        run: |
          docker compose run --rm test

      - name: Extract coverage report from container
        if: always()
        run: |
          # Coverage was written to the named volume; copy it to the host.
          docker compose run --rm --entrypoint "" test \
            sh -c "cp -r /app/coverage /tmp/coverage-out" || true
          docker cp \
            "$(docker compose ps -q test 2>/dev/null | head -1)":/tmp/coverage-out ./coverage \
            2>/dev/null || \
          # Fallback: mount trick via a temp container
          docker run --rm \
            -v "$(basename $(pwd))_coverage:/data" \
            -v "$PWD:/host" \
            alpine sh -c "cp -r /data /host/coverage" 2>/dev/null || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    name: 🚀 Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
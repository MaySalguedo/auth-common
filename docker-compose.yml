services:

  audit:
    build:
      context: .
      dockerfile: .github/docker/Dockerfile
      target: audit

  linter:
    build:
      context: .
      dockerfile: .github/docker/Dockerfile
      target: linter
    volumes:
      - .:/app
      - /app/node_modules

  check:
    build:
      context: .
      dockerfile: .github/docker/Dockerfile
      target: check
    volumes:
      - .:/app
      - /app/node_modules

  test:
    build:
      context: .
      dockerfile: .github/docker/Dockerfile
      target: test
    volumes:
      - .:/app
      - /app/node_modules
      - coverage:/app/coverage

  build:
    build:
      context: .
      dockerfile: .github/docker/Dockerfile
      target: build
    volumes:
      - .:/app
      - /app/node_modules
      - dist:/app/dist

volumes:
  coverage:
  dist:
